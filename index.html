<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Evoluční příšerka – Simulace chůze</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="app-header">
        <h1>Evoluční příšerka – Cesta k cíli</h1>
        <p>Pokročilá vizualizace evoluce chůze. Cílem je dostat se k vlaječce.</p>
    </header>

    <main class="layout">
        <aside class="side-panel">
            <section class="control-panel">
                <h2>Ovládání</h2>
                <button id="btnStart">Start evoluce</button>
                <button id="btnPause">Pauza</button>
                <button id="btnReset">Reset</button>

                <h3>Nastavení evoluce</h3>
                <label>Velikost populace:
                    <input type="number" id="populationSizeInput" value="60" min="10" max="500" />
                </label>
                <label>Mutation rate (pravděpodobnost):
                    <input type="number" id="mutationRateInput" value="0.08" step="0.01" min="0" max="1" />
                </label>
                
                <h3>Konec simulace</h3>
                <label style="display: flex; align-items: center; gap: 10px;">
                    <input type="checkbox" id="infiniteRunInput" checked style="width: auto; margin: 0;"> Nekonečný běh
                </label>
                <label id="maxGenLabel" style="opacity: 0.5;">Max generací:
                    <input type="number" id="maxGenInput" value="50" min="1" disabled />
                </label>
                
                <h3>Rychlost přehrávání</h3>
                <label>
                    <input type="range" id="simSpeedInput" min="1" max="5" value="1" />
                </label>

                <div class="control-group">
                    <label>Délka genomu (čas): <span id="geneLengthVal">100</span></label>
                    <input type="range" id="geneLengthInput" min="20" max="300" value="100">
                </div>

                <div class="control-group">
                    <label>Síla mutace: <span id="mutStrengthVal">25</span></label>
                    <input type="range" id="mutStrengthInput" min="1" max="90" value="25">
                </div>

                <div class="control-group">
                    <label>Vzdálenost cíle: <span id="targetXVal">500</span></label>
                    <input type="range" id="targetXInput" min="200" max="1000" value="500">
                </div>
            </section>
        </aside>

        <section class="simulation-panel">
            <div class="best-simulation-wrapper">
                <h2>Simulace populace</h2>
                <canvas id="bestCreatureCanvas" width="700" height="300"></canvas>
            </div>

            <div class="fitness-graph-panel">
                <h2>Vývoj fitness (skóre)</h2>
                <canvas id="fitnessGraph" width="700" height="200"></canvas>
            </div>
        </section>
    </main>

    <script type="module" src="./js/main.js"></script>
</body>
</html>
